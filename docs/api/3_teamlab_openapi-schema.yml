openapi: 3.0.3
info:
  title: TeamLab API
  version: 1.0.1
  description: |
    API MVP-платформы TeamLab.

    Схема отражает канонический поток:
    Project -> ProjectRole -> RoleInterest -> ProjectMembership

    В MVP доступны:
    - регистрация и JWT-аутентификация;
    - профиль пользователя;
    - справочники Field, Specialization и Skill;
    - проекты и роли проекта;
    - отклики на роли;
    - принятие и отклонение откликов;
    - просмотр участий в проектах.

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Users
    description: Пользователи и профиль
  - name: Auth
    description: JWT-аутентификация
  - name: Skills
    description: Справочник навыков
  - name: Specializations
    description: Справочник специализаций
  - name: Fields
    description: Справочник областей Field
  - name: Projects
    description: Проекты
  - name: Project Roles
    description: Роли проекта
  - name: Role Interests
    description: Отклики на роли
  - name: Memberships
    description: Участия в проектах
  - name: Me
    description: Ресурсы текущего пользователя

paths:
  /api/v1/users/:
    get:
      tags: [Users]
      summary: Список пользователей
      description: Возвращает список пользователей с базовой фильтрацией по структурированным полям.
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          required: false
          description: Поиск по username.
          schema:
            type: string
        - name: level
          in: query
          required: false
          description: Фильтрация по уровню пользователя.
          schema:
            $ref: '#/components/schemas/UserLevel'
        - name: account_type
          in: query
          required: false
          description: Фильтрация по account_type пользователя.
          schema:
            $ref: '#/components/schemas/AccountType'
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      tags: [Users]
      summary: Регистрация пользователя
      description: Создаёт нового пользователя.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreatedResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/v1/users/{user_id}/:
    get:
      tags: [Users]
      summary: Публичный профиль пользователя
      description: Возвращает публичную информацию о пользователе.
      operationId: retrieveUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Публичный профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/users/me/:
    get:
      tags: [Users]
      summary: Текущий пользователь
      description: Возвращает профиль текущего авторизованного пользователя.
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профиль текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    patch:
      tags: [Users]
      summary: Изменение профиля пользователя
      description: |
        Изменяет данные текущего пользователя.
        Если поле `skills` передано, список навыков пользователя полностью заменяется на переданный.
      operationId: updateCurrentUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Профиль успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/users/me/avatar/:
    put:
      tags: [Users]
      summary: Добавление или замена аватара
      description: Принимает изображение в формате base64 внутри JSON.
      operationId: uploadCurrentUserAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUpdateRequest'
      responses:
        '200':
          description: Аватар успешно сохранён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    delete:
      tags: [Users]
      summary: Удаление аватара
      operationId: deleteCurrentUserAvatar
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Аватар удалён
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/users/set_password/:
    post:
      tags: [Users]
      summary: Изменение пароля
      description: Изменяет пароль текущего пользователя.
      operationId: setCurrentUserPassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        '204':
          description: Пароль успешно изменён
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/auth/token/login/:
    post:
      tags: [Auth]
      summary: Получить токены авторизации
      description: Авторизация по email и паролю. Возвращает пару JWT-токенов.
      operationId: tokenLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenLoginRequest'
      responses:
        '200':
          description: Токены успешно выданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          description: Неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailMessage'

  /api/v1/auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Обновить access-токен
      description: Обновляет access-токен по refresh-токену.
      operationId: tokenRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Access-токен успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '401':
          description: Токен недействителен или истёк
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailMessage'

  /api/v1/skills/:
    get:
      tags: [Skills]
      summary: Получение списка навыков
      description: Доступно всем пользователям.
      operationId: listSkills
      parameters:
        - name: search
          in: query
          required: false
          description: Поиск по названию навыка.
          schema:
            type: string
        - name: ordering
          in: query
          required: false
          description: Сортировка, например `name` или `-name`.
          schema:
            type: string
            example: name
      responses:
        '200':
          description: Список навыков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
    post:
      tags: [Skills]
      summary: Добавление нового навыка
      description: Доступно только администраторам.
      operationId: createSkill
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Навык успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'

  /api/v1/specializations/:
    get:
      tags: [Specializations]
      summary: Получение списка специализаций
      description: Доступно всем пользователям.
      operationId: listSpecializations
      parameters:
        - name: search
          in: query
          required: false
          description: Поиск по названию специализации.
          schema:
            type: string
        - name: field_id
          in: query
          required: false
          description: Фильтрация по Field.
          schema:
            type: integer
      responses:
        '200':
          description: Список специализаций
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Specialization'
    post:
      tags: [Specializations]
      summary: Добавление новой специализации
      description: Доступно только администраторам.
      operationId: createSpecialization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecializationCreateRequest'
      responses:
        '201':
          description: Специализация успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Specialization'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'

  /api/v1/fields/:
    get:
      tags: [Fields]
      summary: Получение списка Field
      description: |
        Доступно всем пользователям.
        Список отсортирован по названию по алфавиту.
      operationId: listFields
      parameters:
        - name: search
          in: query
          required: false
          description: Поиск по названию Field.
          schema:
            type: string
      responses:
        '200':
          description: Список Field
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Field'
    post:
      tags: [Fields]
      summary: Добавление нового Field
      description: Доступно только администраторам.
      operationId: createField
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldCreateRequest'
      responses:
        '201':
          description: Field успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'

  /api/v1/projects/:
    get:
      tags: [Projects]
      summary: Получение списка проектов
      description: Доступно всем пользователям.
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          required: false
          description: Поиск по title проекта.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Фильтрация по статусу проекта.
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: field_id
          in: query
          required: false
          description: Фильтрация по Field.
          schema:
            type: integer
      responses:
        '200':
          description: Список проектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjects'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      tags: [Projects]
      summary: Добавление проекта
      description: Создаёт новый проект. Доступно только авторизованным пользователям.
      operationId: createProject
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Проект успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/projects/{project_id}/:
    get:
      tags: [Projects]
      summary: Получение конкретного проекта
      description: Возвращает детальную информацию о проекте. Доступно всем пользователям.
      operationId: retrieveProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Информация о проекте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Projects]
      summary: Изменение проекта
      description: Изменяет данные проекта. Доступно только owner проекта и администраторам.
      operationId: updateProject
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Проект успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/projects/{project_id}/roles/:
    get:
      tags: [Project Roles]
      summary: Получение ролей проекта
      description: Возвращает список ролей проекта. Доступно всем пользователям.
      operationId: listProjectRoles
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Список ролей проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRolesListResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    post:
      tags: [Project Roles]
      summary: Добавление роли в проект
      description: Доступно owner проекта и администраторам.
      operationId: createProjectRole
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRoleCreateRequest'
      responses:
        '201':
          description: Роль успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRole'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/projects/{project_id}/roles/{role_id}/:
    patch:
      tags: [Project Roles]
      summary: Изменение роли в проекте
      description: Доступно owner проекта и администраторам.
      operationId: updateProjectRole
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/RoleIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRoleUpdateRequest'
      responses:
        '200':
          description: Роль успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRole'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/project-roles/{role_id}/interests/:
    get:
      tags: [Role Interests]
      summary: Получить отклики на роль
      description: Возвращает отклики на роль. Доступно owner проекта и администраторам.
      operationId: listRoleInterests
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '200':
          description: Список откликов на роль
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleInterest'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    post:
      tags: [Role Interests]
      summary: Добавление отклика на роль
      description: |
        Создаёт RoleInterest текущего пользователя для указанной ProjectRole.
        Отклик возможен только для открытого проекта и открытой роли.
      operationId: createRoleInterest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '201':
          description: Отклик успешно отправлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleInterest'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/project-roles/{role_id}/interests/{user_id}/accept/:
    post:
      tags: [Role Interests]
      summary: Принять отклик на роль
      description: |
        Переводит RoleInterest в статус `accepted` и создаёт ProjectMembership.
        Доступно owner проекта и администраторам.
      operationId: acceptRoleInterest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Отклик принят, участие создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMembership'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/project-roles/{role_id}/interests/{user_id}/reject/:
    post:
      tags: [Role Interests]
      summary: Отклонить отклик на роль
      description: Переводит RoleInterest в статус `rejected`. Доступно owner проекта и администраторам.
      operationId: rejectRoleInterest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Отклик отклонён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleInterest'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/projects/{project_id}/memberships/:
    get:
      tags: [Memberships]
      summary: Получить участия в проекте
      description: Возвращает участия пользователей в проекте. Доступно всем пользователям.
      operationId: listProjectMemberships
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Список участий в проекте
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMembership'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/projects/{project_id}/memberships/{user_id}/remove/:
    post:
      tags: [Memberships]
      summary: Удалить участника из проекта
      description: |
        Меняет статус участия пользователя на `removed`.
        Доступно owner проекта и администраторам.
      operationId: removeProjectMembership
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Участие пользователя завершено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMembership'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /api/v1/users/me/projects/:
    get:
      tags: [Me]
      summary: Получить мои проекты
      description: |
        Возвращает список проектов, с которыми связан текущий пользователь.
        Тип связи отражается в поле `relation`.
      operationId: listMyProjects
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          required: false
          description: Фильтрация по статусу проекта.
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: relation
          in: query
          required: false
          description: Фильтрация по типу связи пользователя с проектом.
          schema:
            $ref: '#/components/schemas/ProjectRelation'
        - name: search
          in: query
          required: false
          description: Поиск по title проекта.
          schema:
            type: string
      responses:
        '200':
          description: Список проектов текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMyProjects'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/users/me/interests/:
    get:
      tags: [Me]
      summary: Получить мои отклики
      description: Возвращает список RoleInterest текущего пользователя.
      operationId: listMyRoleInterests
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          required: false
          description: Фильтрация по статусу RoleInterest.
          schema:
            $ref: '#/components/schemas/RoleInterestStatus'
      responses:
        '200':
          description: Список откликов текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMyInterests'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Номер страницы.
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Количество объектов на странице.
      schema:
        type: integer
        minimum: 1
        default: 10
    UserIdParam:
      name: user_id
      in: path
      required: true
      description: Уникальный идентификатор пользователя.
      schema:
        type: integer
    ProjectIdParam:
      name: project_id
      in: path
      required: true
      description: Уникальный идентификатор проекта.
      schema:
        type: integer
    RoleIdParam:
      name: role_id
      in: path
      required: true
      description: Уникальный идентификатор роли проекта.
      schema:
        type: integer

  responses:
    ValidationErrorResponse:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    UnauthorizedResponse:
      description: Учетные данные не были предоставлены
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
    ForbiddenResponse:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
    NotFoundResponse:
      description: Объект не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'

  schemas:
    AccountType:
      type: string
      description: Режим пользователя в продукте.
      enum:
        - participant
        - owner

    UserLevel:
      type: string
      description: Уровень пользователя.
      enum:
        - junior
        - middle
        - senior

    WorkFormat:
      type: string
      description: Предпочитаемый формат работы.
      enum:
        - remote
        - hybrid

    UserSkillLevel:
      type: string
      description: Уровень владения навыком.
      enum:
        - basic
        - middle
        - advanced

    ProjectStatus:
      type: string
      description: Статус проекта.
      enum:
        - open
        - closed

    ProjectRelation:
      type: string
      description: Тип связи пользователя с проектом.
      enum:
        - owner
        - member

    RoleInterestStatus:
      type: string
      description: Статус отклика на роль.
      enum:
        - pending
        - accepted
        - rejected

    ProjectMembershipStatus:
      type: string
      description: Статус участия в проекте.
      enum:
        - active
        - left
        - removed

    ValidationError:
      type: object
      description: |
        Ошибка валидации. Ключи объекта соответствуют именам полей,
        значения — массивы строк с сообщениями ошибок.
      additionalProperties:
        type: array
        items:
          type: string

    DetailMessage:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    UnauthorizedError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: Учетные данные не были предоставлены.

    ForbiddenError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: Недостаточно прав.

    NotFoundError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: Объект не найден.

    Skill:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SkillCreateRequest:
