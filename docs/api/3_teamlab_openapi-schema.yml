          maxLength: 150
        email:
          type: string
          format: email
        account_type:
          $ref: '#/components/schemas/AccountType'

    UserUpdateRequest:
      type: object
      description: |
        Частичное обновление профиля текущего пользователя.
        Поле `account_type` не изменяется через пользовательский интерфейс.
      properties:
        username:
