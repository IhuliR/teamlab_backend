        - email
        - bio
        - account_type
        - specialization_id
        - level
        - workload_hours_per_week
        - work_format
        - city
        - avatar
        - created_at
        - updated_at
        - skills
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        bio:
          type: string
          nullable: true
        account_type:
          $ref: '#/components/schemas/AccountType'
        specialization_id:
          type: integer
          nullable: true
        level:
