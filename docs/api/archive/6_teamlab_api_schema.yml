  /api/v1/users/me/:
    get:
      tags: [Users]
      summary: Текущий пользователь
      description: Возвращает профиль текущего авторизованного пользователя.
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профиль текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
              example:
                id: 2
                username: ivan_backend
                email: ivan.backend@example.com
                bio: Backend-разработчик, который делает API для образовательных продуктов.
                account_type: participant
                specialization_id: 1
                level: middle
                workload_hours_per_week: 20
                work_format: remote
                city: Санкт-Петербург
                avatar: https://cdn.teamlab.example/avatars/ivan_backend.png
                created_at: '2026-03-12T09:15:00Z'
                updated_at: '2026-04-20T12:30:00Z'
                skills:
