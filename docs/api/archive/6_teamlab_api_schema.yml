components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Номер страницы.
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Количество объектов на странице.
      schema:
        type: integer
        minimum: 1
        default: 10
    UserIdParam:
      name: user_id
      in: path
      required: true
      description: Уникальный идентификатор пользователя.
      schema:
        type: integer
    CandidateIdParam:
      name: candidate_id
      in: path
      required: true
      description: Уникальный идентификатор кандидата.
      schema:
        type: integer
    ProjectIdParam:
      name: project_id
      in: path
      required: true
      description: Уникальный идентификатор проекта.
      schema:
        type: integer
    RoleIdParam:
      name: role_id
      in: path
      required: true
      description: Уникальный идентификатор роли проекта.
      schema:
        type: integer
    PortfolioWorkIdParam:
      name: portfolio_work_id
      in: path
      required: true
      description: Уникальный идентификатор работы портфолио.
      schema:
        type: integer

  responses:
    ValidationErrorResponse:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          example:
            field:
              - Обязательное поле.
              - Значение не соответствует ожидаемому формату.
            non_field_errors:
              - Некорректное состояние объекта.
              - Действие недоступно для текущего ресурса.
    UnauthorizedResponse:
      description: Учетные данные не были предоставлены
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          example:
            detail: Учетные данные не были предоставлены.
    ForbiddenResponse:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          example:
            detail: Недостаточно прав.
    NotFoundResponse:
      description: Объект не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          example:
            detail: Объект не найден.

  schemas:
    AccountType:
      type: string
      description: Режим пользователя в продукте.
      enum:
        - participant
        - owner

    UserLevel:
      type: string
      description: Уровень пользователя.
      enum:
        - junior
        - middle
        - senior

    WorkFormat:
      type: string
      description: Предпочитаемый формат работы.
      enum:
        - remote
        - hybrid

    UserSkillLevel:
      type: string
      description: Уровень владения навыком.
      enum:
        - basic
        - middle
        - advanced

    ProjectStatus:
      type: string
      description: Статус проекта.
      enum:
        - open
        - closed

    ProjectRelation:
      type: string
      description: Тип связи пользователя с проектом.
      enum:
        - owner
        - member

    RoleInterestStatus:
      type: string
      description: Статус отклика на роль.
      enum:
        - pending
        - accepted
        - rejected

    ProjectMembershipStatus:
      type: string
      description: Статус участия в проекте.
      enum:
        - active
        - left
        - removed

    ValidationError:
      type: object
      description: |
        Ошибка валидации. Ключи объекта соответствуют именам полей,
        значения — массивы строк с сообщениями ошибок.
      additionalProperties:
        type: array
        items:
          type: string

    DetailMessage:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    UnauthorizedError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    ForbiddenError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    NotFoundError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    Skill:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SkillCreateRequest:
