                        updated_at: '2026-04-01T10:00:00Z'
                      - id: 2
                        user_id: 2
                        skill_id: 2
                        level: middle
                        created_at: '2026-03-12T09:21:00Z'
                        updated_at: '2026-04-01T10:05:00Z'
                    portfolio_works:
                      - id: 1
                        user_id: 2
