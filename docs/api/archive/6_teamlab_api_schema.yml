                      - Celery
                    link: https://github.com/ivan-backend/course-analytics
                    created_at: '2026-03-25T15:40:00Z'
                    updated_at: '2026-04-12T08:35:00Z'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/users/me/avatar/:
    put:
      tags: [Users]
      summary: Добавление или замена аватара
      description: Принимает изображение в формате base64 внутри JSON.
      operationId: uploadCurrentUserAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUpdateRequest'
            example:
              avatar: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA
      responses:
        '200':
          description: Аватар успешно сохранён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
              example:
                avatar: https://cdn.teamlab.example/avatars/ivan_backend.png
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    delete:
      tags: [Users]
      summary: Удаление аватара
      operationId: deleteCurrentUserAvatar
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Аватар удалён
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/users/set_password/:
    post:
      tags: [Users]
      summary: Изменение пароля
      description: Изменяет пароль текущего пользователя.
      operationId: setCurrentUserPassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
            example:
              new_password: stronger-password-2026
              current_password: current-password-2026
      responses:
        '204':
          description: Пароль успешно изменён
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /api/v1/auth/token/login/:
    post:
      tags: [Auth]
      summary: Получить токены авторизации
      description: Авторизация по email и паролю. Возвращает пару JWT-токенов.
      operationId: tokenLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenLoginRequest'
            example:
              email: ivan.backend@example.com
              password: current-password-2026
      responses:
        '200':
          description: Токены успешно выданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
              example:
                access: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access-token
                refresh: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          description: Неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailMessage'
              example:
                detail: Неверные учетные данные.

  /api/v1/auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Обновить access-токен
      description: Обновляет access-токен по refresh-токену.
      operationId: tokenRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            example:
              refresh: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token
      responses:
        '200':
          description: Access-токен успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
              example:
                access: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new-access-token
        '401':
          description: Токен недействителен или истёк
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailMessage'
              example:
                detail: Токен недействителен или истек.

  /api/v1/skills/:
    get:
      tags: [Skills]
      summary: Получение списка навыков
      description: Доступно всем пользователям.
      operationId: listSkills
      parameters:
        - name: search
          in: query
          required: false
          description: Поиск по названию навыка.
          schema:
            type: string
        - name: ordering
          in: query
          required: false
          description: Сортировка, например `name` или `-name`.
          schema:
            type: string
      responses:
        '200':
          description: Список навыков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
              example:
                - id: 1
                  name: Python
                  created_at: '2026-02-01T09:00:00Z'
                  updated_at: '2026-02-01T09:00:00Z'
                - id: 2
                  name: Django
                  created_at: '2026-02-01T09:05:00Z'
                  updated_at: '2026-02-01T09:05:00Z'
                - id: 3
                  name: FastAPI
                  created_at: '2026-04-24T09:30:00Z'
                  updated_at: '2026-04-24T09:30:00Z'
                - id: 4
                  name: Figma
                  created_at: '2026-02-01T09:15:00Z'
                  updated_at: '2026-02-01T09:15:00Z'
                - id: 5
                  name: User Research
                  created_at: '2026-02-01T09:20:00Z'
                  updated_at: '2026-02-01T09:20:00Z'
    post:
      tags: [Skills]
      summary: Добавление нового навыка
      description: Доступно только администраторам.
      operationId: createSkill
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
            example:
              name: FastAPI
      responses:
        '201':
          description: Навык успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
              example:
                id: 3
                name: FastAPI
                created_at: '2026-04-24T09:30:00Z'
                updated_at: '2026-04-24T09:30:00Z'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'

  /api/v1/specializations/:
    get:
      tags: [Specializations]
      summary: Получение списка специализаций
      description: Доступно всем пользователям.
      operationId: listSpecializations
      parameters:
        - name: search
          in: query
          required: false
          description: Поиск по названию специализации.
          schema:
            type: string
        - name: field_id
          in: query
          required: false
          description: Фильтрация по Field.
          schema:
            type: integer
      responses:
        '200':
          description: Список специализаций
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Specialization'
              example:
                - id: 1
                  field_id: 1
                  name: Backend-разработчик
                  created_at: '2026-02-01T10:00:00Z'
                  updated_at: '2026-02-01T10:00:00Z'
                - id: 2
                  field_id: 1
                  name: UX-дизайнер
                  created_at: '2026-02-01T10:05:00Z'
                  updated_at: '2026-02-01T10:05:00Z'
    post:
      tags: [Specializations]
      summary: Добавление новой специализации
      description: Доступно только администраторам.
      operationId: createSpecialization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecializationCreateRequest'
            example:
              field_id: 2
              name: Мобильный разработчик
      responses:
        '201':
          description: Специализация успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Specialization'
              example:
                id: 3
                field_id: 2
