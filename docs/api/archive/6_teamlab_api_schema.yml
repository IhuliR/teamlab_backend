                    skill_id: 3
                    level: middle
                    created_at: '2026-04-22T10:15:00Z'
                    updated_at: '2026-04-22T10:15:00Z'
                portfolio_works:
                  - id: 1
                    user_id: 2
                    title: API прогресса студентов
                    description: REST API для отслеживания прогресса группы и обратной связи наставников.
