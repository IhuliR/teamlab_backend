openapi: 3.0.3
info:
  title: TeamLab API
  version: 1.0.1
  description: |
    API MVP-платформы TeamLab.

    Схема отражает канонический поток:
    Project -> ProjectRole -> RoleInterest -> ProjectMembership

    В MVP доступны:
    - регистрация и JWT-аутентификация;
    - профиль пользователя;
    - портфолио пользователя;
    - справочники Field, Specialization и Skill;
    - проекты и роли проекта;
    - отклики на роли;
    - принятие и отклонение откликов;
    - просмотр участий в проектах;
    - избранное;
    - in-app уведомления.

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Users
    description: Пользователи и профиль
  - name: Auth
    description: JWT-аутентификация
  - name: Skills
    description: Справочник навыков
  - name: Specializations
    description: Справочник специализаций
  - name: Fields
    description: Справочник областей Field
  - name: Projects
    description: Проекты
  - name: Project Roles
    description: Роли проекта
  - name: Role Interests
    description: Отклики на роли
  - name: Memberships
    description: Участия в проектах
  - name: Me
    description: Ресурсы текущего пользователя

paths:
  /api/v1/users/:
    get:
      tags: [Users]
      summary: Список пользователей
      description: Возвращает список пользователей с фильтрацией по структурированным полям.
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: level
          in: query
          required: false
          description: Фильтрация по уровню пользователя.
          schema:
            $ref: '#/components/schemas/UserLevel'
        - name: account_type
          in: query
          required: false
          description: Фильтрация по account_type пользователя.
          schema:
            $ref: '#/components/schemas/AccountType'
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
              example:
                count: 2
                next: null
                previous: null
                results:
                  - id: 2
                    username: ivan_backend
                    bio: Backend-разработчик, который делает API для образовательных продуктов.
                    account_type: participant
                    specialization_id: 1
                    level: middle
                    workload_hours_per_week: 20
                    work_format: remote
                    city: Санкт-Петербург
                    avatar: https://cdn.teamlab.example/avatars/ivan_backend.png
                    created_at: '2026-03-12T09:15:00Z'
                    updated_at: '2026-04-20T12:30:00Z'
                    skills:
